<!DOCTYPE html>
<html lang="ps">
<head>
    <meta charset="UTF-8">
    <title>Job Portal</title>
</head>

<body style="font-family: Arial; background:#f4f4f4;">

    <h1 style="text-align:center; color:darkblue;">
        Job Portal - د کار ویب سایټ
    </h1>

    <hr>

    <!-- Jobs List -->
    <h2>موجود Jobs</h2>

    <table border="1" cellpadding="10" width="100%">
        <tr style="background:lightblue;">
            <th>Job Title</th>
            <th>Company</th>
            <th>Location</th>
            <th>Salary</th>
        </tr>

        <tr>
            <td>Web Developer</td>
            <td>ABC Company</td>
            <td>Kabul</td>
            <td>$500</td>
        </tr>

        <tr>
            <td>Laravel Developer</td>
            <td>XYZ Ltd</td>
            <td>Herat</td>
            <td>$700</td>
        </tr>

        <tr>
            <td>Graphic Designer</td>
            <td>Design Hub</td>
            <td>Mazar</td>
            <td>$400</td>
        </tr>
    </table>

    <hr>

    <!-- Apply Form -->
    <h2>Apply Now (درخواست ورکړه)</h2>

    <form>
        <label>نوم:</label><br>
        <input type="text"><br><br>

        <label>ایمیل:</label><br>
        <input type="email"><br><br>

        <label>Job انتخاب کړه:</label><br>
        <select>
            <option>Web Developer</option>
            <option>Laravel Developer</option>
            <option>Graphic Designer</option>
        </select><br><br>

        <button type="submit">Submit</button>
    </form>

    <hr>

    <p style="text-align:center;">
        © 2026 Job Portal
    </p>

</body>
</html>
